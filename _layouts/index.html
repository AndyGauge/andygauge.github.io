<!-- Home page layout. Section order is driven by _data/sections.yml. -->
<!DOCTYPE html>
<html lang="{{ site.lang }}">

  {% include head.html %}

  <body class="bg-github-bg text-github-text">

    {% include navigation.html %}
    {% include header.html %}
    {% include intro.html %}

    {% for section in site.data.sections %}
      {% include {{ section.include }} %}
    {% endfor %}

    {% include footer.html %}
    {% include js.html %}

  </body>
</html>
