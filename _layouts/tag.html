
<!-- Tag Layout Start -->

<!DOCTYPE html>
<html lang="{{ site.lang }}">

  {% include head.html %}

  <body class="bg-github-bg text-github-text">

    {% include navigation.html %}

    <main class="pt-16">
      <div class="container-custom py-8">
        <div class="max-w-3xl mx-auto">

          {% assign tag = page.title %}

          <h1 class="text-2xl font-bold mb-6">#{{ tag }}</h1>

          <div class="space-y-4">
            {% for post in site.posts %}
              {% if post.tags contains tag %}
                {% include post-list.html %}
              {% endif %}
            {% endfor %}
          </div>

        </div>
      </div>
    </main>

    {% include footer.html %}

    {% include js.html %}

  </body>
</html>

<!-- Tag Layout End -->
