
<!-- Blog Layout Start -->

<!DOCTYPE html>
<html lang="{{ site.lang }}">

  {% include head.html %}

  <body class="bg-github-bg text-github-text">

    {% include navigation.html %}

    <main class="pt-16">
      <div class="container-custom py-8">
        <div class="max-w-3xl mx-auto">

          {% include swipe-instructions.html %}

          {{ page.content | markdownify }}

          <div class="space-y-4">
            {% for post in paginator.posts %}
              {% include post-list.html %}
            {% endfor %}
          </div>

          {% include pagination.html %}

        </div>
      </div>
    </main>

    {% include footer.html %}

    {% include js.html %}

  </body>
</html>

<!-- Blog Layout End -->
