
<!-- Pagination Links Start -->

<div class="flex justify-center items-center gap-6 mt-8">
  {% if paginator.previous_page %}
    <a href="{{site.baseurl}}{{paginator.previous_page_path}}" class="text-github-accent hover:underline font-medium">&larr; Newer Posts</a>
  {% endif %}

  {% if paginator.next_page %}
    <a href="{{site.baseurl}}{{paginator.next_page_path}}" class="text-github-accent hover:underline font-medium">Older Posts &rarr;</a>
  {% endif %}
</div>

<!-- Pagination Links End -->
