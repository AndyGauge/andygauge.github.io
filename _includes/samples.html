
<!-- Samples Start -->

<section id="{{ page.section-type }}" class="section-padding bg-github-bg">
  <div class="container-custom">
    <div class="text-center mb-12">
      <h2 class="text-2xl md:text-3xl font-bold text-github-text mb-3">Samples</h2>
      <p class="text-github-text-secondary max-w-2xl mx-auto">{{ page.content }}</p>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
      {% for sample in page.samples %}
      <div class="card-hover p-6 group">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-shrink-0">
            <a href="{{sample.url}}" target="_blank" rel="noopener noreferrer">
              <img src="{{sample.img}}" alt="{{sample.title}}" class="w-full md:w-32 h-32 object-cover rounded-lg shadow-github group-hover:shadow-github-lg transition-shadow duration-200"/>
            </a>
          </div>
          <div class="flex-1">
            <h3 class="text-lg font-semibold text-github-text mb-2">
              <a href="{{sample.url}}" target="_blank" rel="noopener noreferrer" class="hover:text-github-accent transition-colors">
                {{sample.title}}
                <i class="fas fa-external-link-alt text-sm ml-1"></i>
              </a>
            </h3>
            <p class="text-github-text-secondary leading-relaxed">{{ sample.description | markdownify }}</p>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<!-- Samples End -->
