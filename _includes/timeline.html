<!-- Timeline. Data: _data/timeline.yml (ordered newest-first) -->
<section id="timeline" class="section-padding bg-github-bg">
  <div class="container-custom">
    <div class="text-center mb-12">
      <h2 class="text-2xl md:text-3xl font-bold text-github-text mb-3">Timeline</h2>
    </div>

    <div class="construction-timeline max-w-4xl mx-auto">
      {% for event in site.data.timeline %}
      <div class="timeline-item">
        <div class="card-hover p-6 ml-4">
          <div class="flex items-start gap-4">
            <div class="flex-shrink-0">
              <img src="{{site.baseurl}}{{ event.image }}" alt="{{ event.date }}" class="w-16 h-16 rounded-full object-cover border-2 border-github-border">
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2">
                <time class="text-sm font-semibold text-github-accent">{{ event.date }}</time>
                <div class="w-2 h-2 bg-github-accent rounded-full"></div>
              </div>
              <div class="prose prose-sm max-w-none text-github-text">
                {{ event.description | markdownify }}
              </div>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
