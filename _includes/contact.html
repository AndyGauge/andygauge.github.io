
<!-- Contact Start -->

<section id="{{ page.section-type }}" class="section-padding bg-github-bg">
  <div class="container-custom">
    <div class="text-center max-w-2xl mx-auto">

      <h2 class="text-2xl md:text-3xl font-bold text-github-text mb-4">Contact</h2>

      <p class="text-github-text-secondary mb-6">
        To make best use of your funding on your upcoming project, contact me at
      </p>

      {% if site.email %}
        <p class="mb-6">
          <a href="mailto:{{ site.email }}" class="text-github-accent hover:underline text-lg">{{ site.email }}</a>
        </p>
      {% endif %}

      {% include social-buttons.html %}

    </div>
  </div>
</section>

<!-- Contact End -->
