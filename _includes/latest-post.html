
<!-- Latest Post Preview Start -->

<section id="{{ page.section-type }}" class="section-padding bg-github-bg">
  <div class="container-custom">
    <div class="text-center mb-8">
      <h2 class="text-2xl md:text-3xl font-bold text-github-text mb-3">Blog</h2>
    </div>

    <div class="max-w-3xl mx-auto">
      {% assign post = site.posts.first %}
      <div class="card-hover p-6">
        <div class="flex items-center gap-3 mb-3">
          <time class="text-sm font-semibold text-github-accent">{{ post.date | date_to_string }}</time>
          {% if post.category %}
            <span class="text-sm text-github-text-muted">{{ post.category }}</span>
          {% endif %}
        </div>
        <h3 class="text-xl font-bold mb-3">
          <a href="{{site.baseurl}}{{ post.url }}" class="text-github-text hover:text-github-accent transition-colors">{{ post.title }}</a>
        </h3>
        <p class="text-github-text-secondary mb-4">
          {{ post.content | strip_html | truncatewords: site.post-preview-words }}
        </p>
        <a href="{{site.baseurl}}{{ post.url }}#disqus_thread" class="text-sm text-github-text-muted hover:text-github-accent transition-colors">Comments</a>
      </div>

      <div class="text-center mt-8">
        <a href="{{site.baseurl}}/blog/" class="btn-primary">
          <i class="fas fa-book-open mr-2"></i>
          View more posts
        </a>
      </div>
    </div>
  </div>
</section>

<!-- Latest Post Preview End -->
