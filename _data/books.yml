  description: A sample sveltekitbook that explains sveltekitbook itself — twelve pages, one topic each.

- title: NP-Hard
  slug: np-hard
  category: Engineering & Talks
  kind: book
  qr: /img/qr/np-hard.svg
  description: Software maintenance is at least NP-hard and several of its subproblems are undecidable — the proof tax safety-critical pays, and the rest of the industry refuses.

- title: Too Many Lists
  slug: too-many-lists
  category: Engineering & Talks
  kind: book
  qr: /img/qr/too-many-lists.svg
  description: Aria Beingessner's Rust linked-lists book, rewritten with three parallel reader tracks (C / Py / 0) — same arc, three vantages — plus 2021/2024 edition deltas inline and a chapter-end perspective from each track.

- title: Reducibility
  slug: reducibility
  category: Engineering & Talks
  kind: book
  qr: /img/qr/reducibility.svg
  description: Karp's 1972 paper as a polyglot guided tour. Twenty-one NP-complete problems, twenty-one programming languages — overview, code, and business framing per chapter, with figure walkthroughs and a glossary of 130+ terms.

- title: N or P
  slug: n-or-p
  category: Engineering & Talks
  kind: book
  qr: /img/qr/n-or-p.svg
  description: A working manager's guide to which engineering problems are cheap to solve and which are genuinely hard. Thirty-nine sections in five parts — the P/NP line, the solved problems, the hard ones, what to do when "hard" hits your roadmap, and a meeting-room diagnostic for telling them apart.

