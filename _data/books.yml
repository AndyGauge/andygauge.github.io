# Booklog entries. Order within a category is preserved.
# Categories render in the order they first appear in this file.
#
# Fields:
#   title:        display name
#   slug:         GitHub repo name (becomes andygauge.github.io/<slug>/)
#   category:     groups the card under a heading
#   kind:         (optional) "book", "deck", "post" — shown as a small tag
#   description:  one or two sentences, plain text

